name: CloudCart CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  repository-validation:
    name: Validate Repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required files
        shell: bash
        run: |
          required_files=(
            "README.md"
            ".gitignore"
            ".editorconfig"
            "LICENSE"
          )

          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done

          echo "All required repository files are present."

      - name: Check for accidentally committed secrets
        shell: bash
        run: |
          if find . \
            -path "./.git" -prune -o \
            \( -name "*.pem" -o -name "*.key" -o -name "service-account*.json" \) \
            -print | grep -q .; then
            echo "Potential secret file detected."
            exit 1
          fi

          echo "No obvious secret files detected."

  backend-validation:
    name: Validate FastAPI Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run Pytest
        run: python -m pytest